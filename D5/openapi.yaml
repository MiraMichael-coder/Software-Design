openapi: 3.0.0
info:
  title: CRM System API
  description: API documentation for the CRM system including Inventory, Order, and Composite Services.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Inventory Service
  - url: http://localhost:8081
    description: Order Service
  - url: http://localhost:8082
    description: Composite Service (Orchestrator)

paths:
  # --- Inventory Service ---
  /api/v1/inventory/products:
    get:
      summary: List all products
      tags: [Inventory]
      responses:
        '200':
          description: A list of products
    post:
      summary: Create a new product
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: {type: string}
                description: {type: string}
                priceAmount: {type: number}
                priceCurrency: {type: string}
                stockQuantity: {type: integer}
                supplierId: {type: string}
      responses:
        '201':
          description: Product created

  /api/v1/inventory/products/{id}:
    put:
      summary: Update a product
      tags: [Inventory]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: {type: string}
                description: {type: string}
                basePrice: {type: number}
    delete:
      summary: Delete a product
      tags: [Inventory]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Product deleted

  # --- Order Service ---
  /api/v1/orders:
    get:
      summary: List all orders
      tags: [Order]
      responses:
        '200':
          description: A list of orders
    post:
      summary: Create a new order
      tags: [Order]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customerId: {type: string}
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      productId: {type: string}
                      quantity: {type: integer}
                      priceAmount: {type: number}
      responses:
        '201':
          description: Order created

  /api/v1/orders/{id}/delivery:
    put:
      summary: Attach delivery info to an order
      tags: [Order]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                address: {type: string}
                method: {type: string}
      responses:
        '200':
          description: Delivery attached

  /api/v1/orders/{id}/items/{itemId}:
    delete:
      summary: Remove an item from an order
      tags: [Order]
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string}
        - name: itemId
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Item removed

  # --- Composite Service ---
  /api/v1/composite/place-order:
    post:
      summary: Composite Checkout (Orchestration)
      description: Validates stock, creates order, processes payment, deducts stock, and sends notification.
      tags: [Composite]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customerId: {type: string}
                paymentMethod: {type: string, enum: [Card, CashOnDelivery]}
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      productId: {type: string}
                      quantity: {type: integer}
      responses:
        '201':
          description: Order placed successfully
        '400':
          description: Stock validation failed or invalid request
        '402':
          description: Payment failed
